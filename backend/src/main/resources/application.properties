# Server
server.port=${PORT:8080}

# Database — Supabase PostgreSQL (via connection pooler, port 6543)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — compatible con pgBouncer transaction mode
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS — override via env var in Railway (comma-separated origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Supabase Storage
supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}

# Supabase JWT — se valida via JWKS endpoint (no requiere secret manual)
# URL: ${supabase.url}/auth/v1/.well-known/jwks.json

# Multipart — max file size 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator — health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
